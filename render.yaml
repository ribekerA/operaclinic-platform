services:
  - type: web
    name: operaclinic-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: OperaClinic API
      - key: API_PORT
        value: "3001"
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: operaclinic-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: WEB_URL
        sync: false
      - key: COMMERCIAL_ONBOARDING_TTL_HOURS
        value: "48"
      - key: PAYMENT_PROVIDER
        value: mock
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MESSAGING_WHATSAPP_META_ENABLED
        value: "false"
      - key: MESSAGING_WHATSAPP_META_API_BASE_URL
        value: https://graph.facebook.com
      - key: MESSAGING_WHATSAPP_META_API_VERSION
        value: v21.0
      - key: MESSAGING_WHATSAPP_META_ACCESS_TOKEN
        sync: false
      - key: MESSAGING_WHATSAPP_META_APP_SECRET
        sync: false
      - key: SEED_SUPER_ADMIN_EMAIL
        sync: false
      - key: SEED_SUPER_ADMIN_PASSWORD
        sync: false
      - key: SEED_BASE_PLAN_CODE
        value: BASE_MVP
      - key: SEED_BASE_PLAN_NAME
        value: Base MVP
      - key: SEED_BASE_PLAN_DESCRIPTION
        value: Plano base para onboarding inicial.
      - key: SEED_BASE_PLAN_PRICE_CENTS
        value: "0"
      - key: CRON_SECRET
        sync: false
      - key: AGENT_LAYER_ENABLED
        value: "true"
      - key: AGENT_LAYER_ROLLOUT_PERCENTAGE
        value: "5"
      - key: AGENT_METRICS_WINDOW_MINUTES
        value: "15"
      - key: AGENT_SKILL_FAILURE_RATE_ALERT_THRESHOLD
        value: "0.05"
      - key: AGENT_SKILL_P95_ALERT_MS
        value: "1500"
      - key: THROTTLE_TTL_MS
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "60"
      - key: WHATSAPP_PROVIDER
        value: mock
      - key: EVOLUTION_API_BASE_URL
        value: http://localhost:8080
      - key: EVOLUTION_API_KEY
        sync: false
      - key: ANTHROPIC_AGENT_ENABLED
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEMO_RESET_SECRET
        sync: false
      - key: AGENT_API_KEY
        sync: false
      - key: AGENT_API_TENANT_ID
        sync: false

  - type: web
    name: operaclinic-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://operaclinic-api.onrender.com/api/v1

databases:
  - name: operaclinic-db
    plan: free
    databaseName: operaclinic
    user: operaclinic
    region: oregon
