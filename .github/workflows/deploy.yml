name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Trigger Render deploy (API)
        run: |
          curl -s -X POST "https://api.render.com/v1/services/srv-d92nri5aeets73ab56j0/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('id', d))"

      - name: Aguardar API ficar healthy
        run: |
          echo "Aguardando API..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_API_URL }}/api/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ API healthy após ${i}x30s"
              exit 0
            fi
            echo "Tentativa $i/24: status=$STATUS — aguardando 30s..."
            sleep 30
          done
          echo "⚠ API não ficou healthy em 12 minutos — verifique os logs no Render"
          exit 1

  deploy-web:
    name: Deploy Web → Render
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs: deploy-api

    steps:
      - name: Trigger Render deploy (Web)
        run: |
          curl -s -X POST "https://api.render.com/v1/services/srv-d9381ue7r5hc7392d2g0/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('id', d))"

      - name: Aguardar Web ficar healthy
        run: |
          echo "Aguardando Web..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_WEB_URL }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Web healthy após ${i}x30s"
              exit 0
            fi
            echo "Tentativa $i/24: status=$STATUS — aguardando 30s..."
            sleep 30
          done
          echo "⚠ Web não ficou healthy em 12 minutos — verifique os logs no Render"
          exit 1
